name: Periodic Telemetry Pipeline Diagnostics

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  run-diagnostics:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Pipeline Integrity and Model Tests
      env:
        PYTHONPATH: .
      run: |
        pytest tests/

    - name: Generate Simulation Health Snapshot
      env:
        PYTHONPATH: .
      run: |
        python run_pipeline.py
        echo "Pipeline run completed successfully on $(date)" >> pipeline_heartbeat.log

    - name: Commit and Push Heartbeat Log
      env:
        # 🚀 We pass your personal token into a secure environment variable
        GRID_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
      run: |
        git config --global user.name "Jossiaah"
        git config --global user.email "josiahcastillo19@gmail.com"
        git add -f pipeline_heartbeat.log
        
        # Cleanly injects the environment token variable right into the git call
        git diff-index --quiet HEAD || git commit -m "chore: automated telemetry cron heartbeat [skip ci]"
        git push https://Jossiaah:${GRID_TOKEN}@github.com/jossiaah/telemetry-anomoly-pipeline main
