name: Periodic Telemetry Pipeline Diagnostics

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  run-diagnostics:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Pipeline Integrity and Model Tests
      env:
        PYTHONPATH: .
      run: |
        pytest tests/

    - name: Generate Simulation Health Snapshot
      env:
        PYTHONPATH: .
      run: |
        python run_pipeline.py
        echo "Pipeline run completed successfully on $(date)" >> pipeline_heartbeat.log

    - name: Commit and Push Heartbeat Log
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add -f pipeline_heartbeat.log
        git diff-index --quiet HEAD || git commit -m "chore: automated telemetry cron heartbeat [skip ci]"
        git push
